<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — 美善基金會庫存管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#fdf6f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:14px;padding:40px 36px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
h2{color:#fe7b81;text-align:center;margin-bottom:6px;font-size:20px}
p.sub{text-align:center;font-size:12px;color:#999;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none;transition:border .15s}
input:focus{border-color:#fe7b81}
button{width:100%;padding:11px;background:#fe7b81;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
button:hover{background:#fd6870}
.alert{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;padding:9px 14px;border-radius:7px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="box">
  <h2>📦 美善基金會</h2>
  <p class="sub">庫存管理系統 — 請登入</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <label>帳號</label>
    <input type="text" name="username" required autofocus placeholder="請輸入帳號">
    <label>密碼</label>
    <input type="password" name="password" required placeholder="請輸入密碼">
    <button type="submit">登入</button>
  </form>
</div>
</body>
</html>
